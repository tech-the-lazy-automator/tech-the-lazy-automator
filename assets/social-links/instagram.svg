<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="110" height="28">
  <defs>
    <filter id="s" x="0" y="0" width="1" height="1">
      <feFlood flood-opacity="0.3" result="f"/>
      <feComposite in="f" in2="SourceAlpha" operator="in"/>
      <feOffset dx="1" dy="1"/>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feComposite in2="SourceGraphic"/>
      <feBlend mode="normal"/>
    </filter>
    <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFDC80"/>
      <stop offset="25%" stop-color="#FCAF45"/>
      <stop offset="50%" stop-color="#F77737"/>
      <stop offset="75%" stop-color="#C13584"/>
      <stop offset="100%" stop-color="#833AB4"/>
    </linearGradient>
    <linearGradient id="ig2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCAF45"/>
      <stop offset="50%" stop-color="#E1306C"/>
      <stop offset="100%" stop-color="#6A0572"/>
    </linearGradient>
    <linearGradient id="a" x2="0" y2="100%">
      <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
      <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="110" height="28" rx="3" fill="#fff"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- Left section -->
    <rect width="30" height="28" fill="#C13584"/>
    <!-- Right section -->
    <rect x="30" width="80" height="28" fill="#E1306C"/>
    <rect width="110" height="28" fill="url(#a)"/>
  </g>
  <!-- Instagram icon -->
  <g transform="translate(6, 5)" fill="none" stroke="#fff" stroke-width="1.5">
    <!-- Outer rounded square -->
    <rect x="1" y="1" width="16" height="16" rx="4" ry="4"/>
    <!-- Inner circle -->
    <circle cx="9" cy="9" r="3.5"/>
    <!-- Dot -->
    <circle cx="14" cy="4" r="1" fill="#fff" stroke="none"/>
  </g>
  <!-- Label text -->
  <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
    <text x="70" y="19" filter="url(#s)" fill="#010101" fill-opacity=".3">Instagram</text>
    <text x="70" y="18">Instagram</text>
  </g>
</svg>