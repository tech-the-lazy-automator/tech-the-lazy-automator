<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="102" height="28">
  <defs>
    <filter id="s" x="0" y="0" width="1" height="1">
      <feFlood flood-opacity="0.3" result="f"/>
      <feComposite in="f" in2="SourceAlpha" operator="in"/>
      <feOffset dx="1" dy="1"/>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feComposite in2="SourceGraphic"/>
      <feBlend mode="normal"/>
    </filter>
    <linearGradient id="a" x2="0" y2="100%">
      <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
      <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="102" height="28" rx="3" fill="#fff"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="30" height="28" fill="#1a73e8"/>
    <rect x="30" width="72" height="28" fill="#4285F4"/>
    <rect width="102" height="28" fill="url(#a)"/>
  </g>
  <!-- Globe icon - clean outlined -->
  <g transform="translate(6, 5)" fill="none" stroke="#fff" stroke-width="1.3">
    <!-- Outer circle -->
    <circle cx="9" cy="9" r="7.5"/>
    <!-- Horizontal equator -->
    <ellipse cx="9" cy="9" rx="7.5" ry="0"/>
    <line x1="1.5" y1="9" x2="16.5" y2="9"/>
    <!-- Top and bottom horizontal bands -->
    <line x1="3" y1="5" x2="15" y2="5"/>
    <line x1="3" y1="13" x2="15" y2="13"/>
    <!-- Center vertical -->
    <line x1="9" y1="1.5" x2="9" y2="16.5"/>
    <!-- Left curve -->
    <path d="M9 1.5 C5.5 5 5.5 13 9 16.5" stroke-linecap="round"/>
    <!-- Right curve -->
    <path d="M9 1.5 C12.5 5 12.5 13 9 16.5" stroke-linecap="round"/>
  </g>
  <!-- Label text -->
  <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
    <text x="66" y="19" filter="url(#s)" fill="#010101" fill-opacity=".3">Website</text>
    <text x="66" y="18">Website</text>
  </g>
</svg>