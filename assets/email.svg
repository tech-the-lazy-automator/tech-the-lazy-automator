<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="94" height="28">
  <defs>
    <filter id="s" x="0" y="0" width="1" height="1">
      <feFlood flood-opacity="0.3" result="f"/>
      <feComposite in="f" in2="SourceAlpha" operator="in"/>
      <feOffset dx="1" dy="1"/>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feComposite in2="SourceGraphic"/>
      <feBlend mode="normal"/>
    </filter>
    <linearGradient id="a" x2="0" y2="100%">
      <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
      <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="94" height="28" rx="3" fill="#fff"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="30" height="28" fill="#c0392b"/>
    <rect x="30" width="64" height="28" fill="#e74c3c"/>
    <rect width="94" height="28" fill="url(#a)"/>
  </g>
  <!-- Email envelope icon -->
  <g transform="translate(6, 7)" fill="#fff">
    <rect width="18" height="14" rx="2"/>
    <path d="M0 2 L9 9 L18 2" stroke="#e74c3c" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Label text -->
  <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
    <text x="62" y="19" filter="url(#s)" fill="#010101" fill-opacity=".3">Email</text>
    <text x="62" y="18">Email</text>
  </g>
</svg>