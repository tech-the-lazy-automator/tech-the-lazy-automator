          L67.81 73.52
          C68.84 74.35 69.60 74.74 70.57 74.74
          C72.52 74.74 74.21 73.29 74.21 71.18
          C74.21 70.84 74.09 70.29 73.87 69.72 Z
      "/>
    </g>
  </g>

  <!-- Label -->
  <text x="30" y="18"
